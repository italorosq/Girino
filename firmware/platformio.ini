; Girino — Plataforma didática de controle de motor DC
; LaRA — Laboratório de Robótica e Automação

[platformio]
default_envs = girino

; --- Configuração de ambiente ---
[env:girino]
platform = espressif8266@4.2.1
board = esp12e
framework = arduino

; Monitor serial
monitor_speed = 115200
monitor_filters = esp8266_exception_decoder

; Velocidade de upload
upload_speed = 921600

; --- WiFi e credenciais (via .env) ---
; Criar arquivo .env na pasta firmware/ com:
;   WIFI_SSID="sua_rede"
;   WIFI_PASSWORD="sua_senha"
;   OTA_PASSWORD="senha_ota"
build_flags =
    -DWIFI_SSID='"$WIFI_SSID"'
    -DWIFI_PASSWORD='"$WIFI_PASSWORD"'
    -DOTA_PASSWORD='"$OTA_PASSWORD"'

; --- Dependências ---
lib_deps =
    ayushsharma82/ElegantOTA@^3.1.5
    esp8266/ESP8266WebServer@^1.0

; --- Partições OTA ---
; Usar partição com espaço para OTA (two firmware images)
board_build.filesystem = littlefs
; board_build.ldscript = eagle.flash.4m3m.ld  ; Descomentar para flash de 4MB

; --- Definições de compilação ---
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBAUD_RATE=115200
